name: ReplyPilot QA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_ENV: development
  NODE_ENV: test
  SHOPIFY_API_KEY: test_api_key
  SHOPIFY_API_SECRET: test_api_secret
  SHOPIFY_APP_URL: http://127.0.0.1:3000
  DEV_DATABASE_URL: file:./dev.sqlite
  SCOPES: read_products

jobs:
  qa:
    name: Static checks, unit tests, and Shopify validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Validate Shopify config
        run: npm run shopify:validate

      - name: Build Shopify app
        run: npm run shopify:build

  e2e:
    name: Playwright smoke and accessibility checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: PLAYWRIGHT_START_SERVER=true npm run test:e2e

      - name: Run accessibility tests
        run: PLAYWRIGHT_START_SERVER=true npm run test:a11y

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
